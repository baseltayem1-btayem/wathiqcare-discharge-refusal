<section class="case-details-card" [attr.dir]="direction">
    <header class="card-header">
        <h2 class="card-title">Workflow Progress | تقدم الإجراءات</h2>
        <p class="card-subtitle">Reusable medico-legal workflow tracker for case details views.</p>
    </header>

    <div class="toolbar">
        <label>
            <span>Workflow</span>
            <select [(ngModel)]="selectedWorkflow">
                <option value="discharge_refusal">Discharge Refusal</option>
                <option value="informed_consent">Informed Consent</option>
                <option value="financial_acknowledgment">Financial Acknowledgment</option>
                <option value="administrative_case">Administrative Case</option>
            </select>
        </label>

        <label>
            <span>Language</span>
            <select [(ngModel)]="language">
                <option value="ar">Arabic</option>
                <option value="en">English</option>
            </select>
        </label>
        <!-- Legacy example workflow tracker HTML removed -->
        [enableStepNavigation]="true" (stepSelected)="onStepSelected($event)"></app-workflow-progress-tracker>

        <p class="integration-note" *ngIf="integrationNote">{{ integrationNote }}</p>
</section>
