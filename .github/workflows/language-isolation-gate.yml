name: language-isolation-gate

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  language-isolation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run language scanners
        run: npm run audit:language

      - name: Enforce zero-violation gate
        run: npm run audit:language:gate
