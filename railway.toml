[build]
builder = "dockerfile"
# Railway service rootDirectory=apps/api/ is the build context;
# this Dockerfile uses paths relative to that directory.
dockerfilePath = "apps/api/Dockerfile"

[deploy]
# startCommand is omitted — the Dockerfile CMD handles PORT expansion:
#   CMD ["sh", "-c", "uvicorn backend.main:app --host 0.0.0.0 --port ${PORT:-8000}"]
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
