[build]
builder = "dockerfile"
# Railway service rootDirectory=apps/api/ is the build context;
# this Dockerfile uses paths relative to that directory.
dockerfilePath = "apps/api/Dockerfile"

[deploy]
# Explicitly set startCommand to override any persisted dashboard value.
# sh -c guarantees $PORT is shell-expanded before passing to uvicorn.
startCommand = "sh -c 'uvicorn backend.main:app --host 0.0.0.0 --port ${PORT:-8000}'"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
