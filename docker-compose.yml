services:
  postgres:
    image: postgres:16
    container_name: wathiqcare-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: wCare@2026
      POSTGRES_DB: wathiqcare
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
