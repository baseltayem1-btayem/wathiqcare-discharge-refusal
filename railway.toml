[build]
builder = "dockerfile"
# Railway service rootDirectory=apps/api/ is the build context;
# this Dockerfile uses paths relative to that directory.
dockerfilePath = "apps/api/Dockerfile"

[deploy]
# WORKDIR in the Dockerfile is /app and apps/api/ is copied there,
# so uvicorn can resolve backend.main directly without a cd.
startCommand = "uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
